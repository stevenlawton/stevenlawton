# Vale config for de-LLM linting of the CV. Run: make vale
# Styles are downloaded by `vale sync` into .vale/styles (gitignored).
StylesPath = .vale/styles
MinAlertLevel = suggestion

# Curated for SIGNAL. The AI ruleset is the point; write-good/proselint add light
# prose hygiene. Microsoft/alex/Readability are synced but OFF by default — they
# drown the AI signal in house-style noise (Microsoft alone = 270+ nags on this CV).
Packages = https://github.com/ammil-industries/vale-signs-of-ai-writing/releases/download/v0.1.1/signs-of-ai-writing.zip, write-good, proselint, Microsoft, alex, Readability

[*.md]
BasedOnStyles = signs-of-ai-writing, write-good, proselint
# To get a stricter pass, add to the line above: Microsoft, alex, Readability

# Disable noise: E-Prime flags every 'is/are/be' — including human contractions,
# which is the opposite of an AI tell. Off.
write-good.E-Prime = NO
